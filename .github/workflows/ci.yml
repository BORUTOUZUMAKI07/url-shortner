name: CI

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --upgrade pip hatchling
      - run: pip install .[dev]
      - run: ruff check src/ --exit-zero
      - run: mypy src/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkforge_user
          POSTGRES_PASSWORD: linkforge_password
          POSTGRES_DB: linkforge_db
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://linkforge_user:linkforge_password@localhost:5432/linkforge_db
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --upgrade pip hatchling
      - run: pip install .[dev]
      - run: python -m alembic upgrade head
      - run: python -m pytest tests/ -v --timeout=60 -m "not integration"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, frontend-build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Lowercase repo
        shell: bash
        run: echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        shell: bash
        run: |
          docker buildx build \
            --cache-from type=gha --cache-to type=gha,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend:latest \
            --push ./backend
      - name: Build and push frontend
        shell: bash
        run: |
          docker buildx build \
            --cache-from type=gha --cache-to type=gha,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/frontend:latest \
            --push ./frontend
