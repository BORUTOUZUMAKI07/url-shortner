name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check src/ --exit-zero

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkforge_user
          POSTGRES_PASSWORD: linkforge_password
          POSTGRES_DB: linkforge_db
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://linkforge_user:linkforge_password@localhost:5432/linkforge_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --upgrade pip hatchling
      - run: pip install .[dev]
      - run: python -m alembic upgrade head
      - run: python -m compileall src/
      - name: Run tests (capture output)
        run: python -m pytest tests/ -v --cov=src --cov-report=xml -k "not kafka" --timeout=120 2>&1 | tee /tmp/test_output.log
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: /tmp/test_output.log
      - uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Debug info
        run: node --version && npm --version
      - run: npm ci
      - name: Build (capture output)
        run: npm run build 2>&1 | tee /tmp/build_output.log
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: /tmp/build_output.log

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, frontend-build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch

      - name: Build and push backend
        shell: bash
        run: |
          PUSH_FLAG=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            PUSH_FLAG="--push"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --tag "${{ steps.meta-backend.outputs.tags }}" \
            --label "${{ steps.meta-backend.outputs.labels }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            $PUSH_FLAG \
            ./backend 2>&1 | tee /tmp/docker_backend.log

      - name: Debug Docker available
        shell: bash
        run: |
          set -x
          docker --version
          docker buildx version 2>&1 || echo "no buildx"
          docker info 2>&1 | head -10 || echo "no docker info"
          ls -la frontend/Dockerfile 2>&1
          ls -la frontend/package.json 2>&1

      - name: Build frontend (amd64 only)
        shell: bash
        run: |
          set -x
          docker build ./frontend 2>&1 | tee /tmp/docker_frontend.log

      - name: Upload backend Docker log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-backend-log
          path: /tmp/docker_backend.log

      - name: Upload frontend Docker log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-frontend-log
          path: /tmp/docker_frontend.log

      - name: Show frontend Docker log excerpt on failure
        if: failure()
        shell: bash
        run: |
          echo "### Frontend Docker Build Output (last 200 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -200 /tmp/docker_frontend.log 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "(no log file)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
