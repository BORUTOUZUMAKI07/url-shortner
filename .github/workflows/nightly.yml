name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  nightly-tests:
    name: Nightly Full Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkforge_user
          POSTGRES_PASSWORD: linkforge_password
          POSTGRES_DB: linkforge_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      DATABASE_URL: postgresql://linkforge_user:linkforge_password@localhost:5432/linkforge_db
      MONGODB_URI: mongodb://admin:adminpassword@localhost:27017
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --upgrade pip hatchling
      - run: pip install .[dev]
      - run: python -m alembic upgrade head
      - run: ruff check src/
      - run: mypy src/
      - name: Run full test suite (incl. concurrency)
        run: python -m pytest tests/ -v --cov=src --cov-report=xml --timeout=120 2>&1 | tee /tmp/nightly_output.log
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-log
          path: /tmp/nightly_output.log
      - uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend,nightly
