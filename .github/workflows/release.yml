name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase repository name (Docker tags must be lowercase)
        shell: bash
        run: echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend:${{ steps.version.outputs.VERSION }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend:latest \
            --push \
            ./backend

      - name: Build and push frontend
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/frontend:${{ steps.version.outputs.VERSION }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/frontend:latest \
            --push \
            ./frontend

      - name: Generate changelog
        id: changelog
        run: |
          git log --oneline "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" --format="- %s" > /tmp/changelog.txt
          echo "---" >> /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
